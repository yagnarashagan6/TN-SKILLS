<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Cricket Animation</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <style>
    /* Basic Reset */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    /* Page Setup */
    body {
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      background: #0099ff;
    }

    /* Animation Area */
    .animation-area {
      position: relative;
      width: 800px;
      height: 400px;
      border: 3px solid #fff;
      background: linear-gradient(#60c7ff, #0077cc);
    }

    /* Bowler */
    .bowler {
      position: absolute;
      left: 20px;
      bottom: 0;
      width: 250px;
      animation: bowlerMove 2s ease forwards;
    }

    /* Bowl Animation Keyframes */
    @keyframes bowlerMove {
      0% {
        transform: translateX(0);
      }
      100% {
        transform: translateX(30px);
      }
    }

    /* Cricket Ball */
    .ball {
      position: absolute;
      width: 60px;
      top: 80%;
      left: 220px;
      animation: ballZigzag 3s ease-in-out infinite;
    }

    /* Zig-Zag Motion */
    @keyframes ballZigzag {
      0% {
        left: 220px;
        top: 80%;
      }
      20% {
        left: 300px;
        top: 60%;
      }
      40% {
        left: 380px;
        top: 75%;
      }
      60% {
        left: 460px;
        top: 55%;
      }
      80% {
        left: 540px;
        top: 70%;
      }
      100% {
        left: 620px;
        top: 50%;
      }
    }
  </style>
  <body>
    <div class="animation-area">
      <!-- Bowler -->
      <img
        src="https://png.pngtree.com/png-vector/20250624/ourmid/pngtree-cricket-player-bowling-action-illustration-png-image_16587689.png"
        alt="Bowler"
        class="bowler"
      />

      <!-- Ball -->
      <img
        src="https://png.pngtree.com/png-vector/20211006/ourmid/pngtree-cricket-ball-png-image_3971675.png"
        alt="Cricket Ball"
        class="ball"
      />
    </div>
  </body>
</html>
