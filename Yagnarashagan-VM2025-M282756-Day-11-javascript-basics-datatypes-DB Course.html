      /* Number */
      var age = 45;
      const pi = 3.14;
      document.write(age);
      document.write("<br>");
      document.write(pi);

      /* Boolean */
      var pass = true;
      var fail = false;
      document.write(pass);
      document.write("<br>");
      document.write(fail);
      document.write("<br>");
      /* undefined */
      var a;

      /* NULL */
      var b = null;
      console.log(b);

      /* array */
      const array1 = [45, true, "rajan"];
      console.log(array1);

      /* object */
      const obj_name = {
        roll: 45,
        student_name: "ravi",
        subject: "maths",
      };
      console.log(obj_name);

      // Print numbers from 1 to 5 using for loop
      for (let i = 1; i <= 5; i++) {
        console.log("For Loop:", i);
      }

      // Print numbers from 1 to 5 using while loop
      let j = 1;
      while (j <= 5) {
        console.log("While Loop:", j);
        j++;
      }

      // Print numbers from 1 to 5 using do-while loop
      let k = 1;
      do {
        console.log("Do-While Loop:", k);
        k++;
      } while (k <= 5);
